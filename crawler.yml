name: Crawler Chasseur Nocturne

on:
  schedule:
    - cron: '0 23 * * *' # S'exécute tous les jours à 23h00 UTC
  workflow_dispatch: # Permet de lancer le script manuellement en un clic

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3
        
      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Lancer le Crawler
        run: python crawler.py
